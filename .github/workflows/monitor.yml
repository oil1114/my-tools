name: Monitor

# 「自我接力」觸發：每一棒執行時，一開始就用 DISPATCH_TOKEN 排下一棒，
# 靠 concurrency 排隊，等這一棒跑完才會開始下一棒。完全不靠 GitHub 內建排程
# （它對新 repo 常常不穩、不會自己跑）。
# 每天要做什麼（安靜時段 / 重設基準 / 正常監控）由 monitor.py 依台灣時間判斷。
on:
  workflow_dispatch:
    inputs:
      reset_baseline:
        description: "重設基準（只重建、不通知）"
        type: boolean
        default: false

permissions:
  contents: write          # 讓工作流程可以把 state.json 存回 repo

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 一開始就排下一棒；放最前面，就算後面步驟失敗，接力也不會斷。
      - name: 排下一棒
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: gh workflow run monitor.yml -R ${{ github.repository }} || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝 Playwright 瀏覽器
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: 節奏控制（把每棒拉長到約 6 分鐘一次）
        run: sleep 300

      - name: 執行監控
        env:
          TZ: Asia/Taipei          # 讓程式的日期/時段計算用台灣時間
          FE_ACCOUNT: ${{ secrets.FE_ACCOUNT }}
          FE_PASSWORD: ${{ secrets.FE_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          RESET_BASELINE: ${{ github.event.inputs.reset_baseline == 'true' && '1' || '' }}
          WATCH_DOWS: ${{ vars.WATCH_DOWS }}
          WATCH_START_HOUR: ${{ vars.WATCH_START_HOUR }}
          WATCH_END_HOUR: ${{ vars.WATCH_END_HOUR }}
        run: python monitor.py

      - name: 保存狀態
        if: always()
        run: |
          if [ -n "$(git status --porcelain state.json reset_date.txt alert_date.txt)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            for f in state.json reset_date.txt alert_date.txt; do
              [ -f "$f" ] && git add "$f"
            done
            git commit -m "update state [skip ci]"
            git pull --rebase --autostash origin ${{ github.ref_name }} || true
            git push
          fi
