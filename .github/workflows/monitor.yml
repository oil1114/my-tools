name: Monitor

on:
  workflow_dispatch:
    inputs:
      reset_baseline:
        type: boolean
        default: false
      orders_report:
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: chain
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: gh workflow run monitor.yml -R ${{ github.repository }} || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: deps
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: pace
        run: sleep 300

      - name: run
        env:
          TZ: Asia/Taipei
          FE_ACCOUNT: ${{ secrets.FE_ACCOUNT }}
          FE_PASSWORD: ${{ secrets.FE_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          HASH_SALT: ${{ secrets.HASH_SALT }}
          RESET_BASELINE: ${{ github.event.inputs.reset_baseline == 'true' && '1' || '' }}
          ORDERS_REPORT: ${{ github.event.inputs.orders_report == 'true' && '1' || '' }}
          WATCH_DOWS: ${{ vars.WATCH_DOWS }}
          WATCH_START_HOUR: ${{ vars.WATCH_START_HOUR }}
          WATCH_END_HOUR: ${{ vars.WATCH_END_HOUR }}
        run: python monitor.py

      - name: save
        if: always()
        run: |
          if [ -n "$(git status --porcelain state.json reset_date.txt alert_date.txt tg_offset.txt)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            for f in state.json reset_date.txt alert_date.txt tg_offset.txt; do
              [ -f "$f" ] && git add "$f"
            done
            git commit -m "update state [skip ci]"
            git pull --rebase --autostash origin ${{ github.ref_name }} || true
            git push
          fi
