name: Monitor

on:
  schedule:
    # 刻意用「非整數、不等間隔」的時間點，避免固定規律被偵測。
    # 再加上執行步驟裡的隨機延遲，實際查詢時間點是打散的。
    # （GitHub 排程本身在尖峰時也常延遲數分鐘，屬正常現象）
    - cron: "4,21,33,48 * * * *"
  workflow_dispatch: {}   # 也可以在 Actions 頁面手動按一下執行

permissions:
  contents: write          # 讓工作流程可以把 state.json 存回 repo

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝 Playwright 瀏覽器
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: 執行監控
        env:
          FE_ACCOUNT: ${{ secrets.FE_ACCOUNT }}
          FE_PASSWORD: ${{ secrets.FE_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          # 以下為選填（在 Settings > Variables 設定，可留空）
          WATCH_DOWS: ${{ vars.WATCH_DOWS }}
          WATCH_START_HOUR: ${{ vars.WATCH_START_HOUR }}
          WATCH_END_HOUR: ${{ vars.WATCH_END_HOUR }}
        run: |
          # 只有「排程」執行才隨機延遲 0～8 分鐘，讓實際查詢時間點不規律；
          # 手動觸發（測試用）不延遲，馬上跑。
          if [ "${{ github.event_name }}" = "schedule" ]; then
            sleep $((RANDOM % 480))
          fi
          python monitor.py

      - name: 保存狀態
        if: always()
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "update state [skip ci]"
            git pull --rebase --autostash origin ${{ github.ref_name }} || true
            git push
          fi
